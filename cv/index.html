<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Aly Dhedhi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--cream:#F6F1E8;--cream-dark:#EEE8DA;--ink:#1C1C1A;--ink-mid:#4A4A46;--ink-light:#888880;--rule:#D8D0C0;--accent:#8B6F47;--link:#5C4830}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;font-size:15.5px;line-height:1.8}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:var(--cream-dark);border-right:1px solid var(--rule);padding:2rem 1.5rem;overflow-y:auto;z-index:200}
.sidebar .avatar{width:160px;height:200px;margin:0 auto 1.2rem;border:1px solid var(--rule);border-radius:2px;overflow:hidden}
.sidebar .avatar img{width:100%;height:100%;object-fit:cover;display:block}
.sidebar h3{font-family:'EB Garamond',Georgia,serif;font-size:1.3rem;font-weight:500;text-align:center;margin-bottom:.2rem}
.sidebar .bio{font-size:12px;color:var(--ink-mid);text-align:center;margin-bottom:1.5rem;line-height:1.6}
.sidebar .follow-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-light);margin:1.2rem 0 .5rem;font-weight:500}
.sidebar ul{list-style:none}
.sidebar li{padding:.25rem 0;border-top:1px solid var(--rule);font-size:13px}
.sidebar li:first-child{border-top:none}
.sidebar li a{color:var(--link);text-decoration:none;transition:color .2s}
.sidebar li a:hover{color:var(--ink)}
.top-nav{margin-left:260px;background:var(--cream);border-bottom:1px solid var(--rule);padding:.7rem 2rem;display:flex;gap:1.8rem;align-items:center;position:sticky;top:0;z-index:100}
.top-nav a{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mid);text-decoration:none;font-weight:400;transition:color .2s}
.top-nav a:hover,.top-nav a.active{color:var(--ink)}
.main{margin-left:260px;padding:0}
.cv-header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--rule)}
.cv-header h1{font-family:'EB Garamond',Georgia,serif;font-size:2rem;font-weight:500;margin-bottom:.4rem}
.cv-header p{font-size:14px;color:var(--ink-mid)}
.cv-header a{color:var(--link)}
.pdf-viewer{width:100%;height:calc(100vh - 120px);border:none;display:block}
@media(max-width:900px){.sidebar{position:relative;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--rule)}.main,.top-nav{margin-left:0}.pdf-viewer{height:70vh}}
@media(max-width:560px){.top-nav{gap:1rem !important;flex-wrap:wrap}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="avatar">
    <img src="../portrait.jpg" alt="Aly Dhedhi">
  </div>
  <h3>Aly Dhedhi</h3>

  <ul>

    <li><a href="https://github.com/DHEDHiAly" target="_blank">GitHub</a></li>
    <li><a href="https://orcid.org/0009-0007-9255-4906" target="_blank">ORCID</a></li>
    <li><a href="https://yallagive.com/en/fundraiser/Aly-Dhedhi-15473" target="_blank">Fundraising</a></li>
  </ul>
</aside>

<nav class="top-nav">
  <a href="/">Home</a>
  <a href="/#current">Research</a>

  <a href="/#education">Education</a>
  <a href="/#tcf">Impact</a>
  <a href="/cv/" class="active">CV</a>
  <a href="/#contact">Contact</a>
</nav>

<div class="main">
  <header class="cv-header">
    <h1>CV</h1>
    <p>Here is a link to the PDF file shown below: <a href="resume.pdf" target="_blank">Aly Dhedhi CV (PDF)</a></p>
  </header>

  <iframe class="pdf-viewer" src="resume.pdf" title="Aly Dhedhi CV"></iframe>
</div>

</body>
</html>
