<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Aly Dhedhi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--cream:#F6F1E8;--cream-dark:#EEE8DA;--ink:#1C1C1A;--ink-mid:#4A4A46;--ink-light:#888880;--rule:#D8D0C0;--accent:#8B6F47;--link:#5C4830}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;font-size:15.5px;line-height:1.8;max-width:720px;margin:0 auto;padding:0 2rem}
nav{position:sticky;top:0;background:var(--cream);border-bottom:1px solid var(--rule);padding:1rem 0;z-index:100;display:flex;gap:2rem;align-items:center}
nav a{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mid);text-decoration:none;font-weight:400;transition:color .2s}
nav a:hover{color:var(--ink)}
.nav-name{font-family:'EB Garamond',Georgia,serif;font-size:15px;letter-spacing:0;text-transform:none;color:var(--ink);font-weight:500;margin-right:auto}
.cv-header{padding:3rem 0 2rem;border-bottom:1px solid var(--rule)}
.cv-header h1{font-family:'EB Garamond',Georgia,serif;font-size:2.2rem;font-weight:500;margin-bottom:.5rem}
.cv-header p{font-size:14px;color:var(--ink-mid);margin-bottom:1rem}
.cv-header a{font-size:13px;color:var(--link)}
.pdf-viewer{width:100%;height:90vh;border:1px solid var(--rule);margin:1.5rem 0;display:block;border-radius:2px}
footer{padding:3rem 0 4rem;border-top:1px solid var(--rule)}
.back-link{font-size:13px;color:var(--link);text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:1px}
@media(max-width:560px){nav{gap:1.2rem;flex-wrap:wrap}}
</style>
</head>
<body>

<nav>
  <span class="nav-name">Aly Dhedhi</span>
  <a href="/">Home</a>
  <a href="/#current">Research</a>
  <a href="/#education">Education</a>
  <a href="/#contact">Contact</a>
</nav>

<header class="cv-header">
  <h1>CV</h1>
  <p>Here is a link to the PDF file shown below: <a href="resume.pdf" target="_blank">Aly Dhedhi CV (PDF)</a></p>
</header>

<iframe class="pdf-viewer" src="resume.pdf" title="Aly Dhedhi CV"></iframe>

<footer>
  <a class="back-link" href="/">← Back to website</a>
</footer>

</body>
</html>
