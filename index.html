<script>
(function(){
var out = document.getElementById('output');
var input = document.getElementById('cmd-input');

var history = [];
var historyIdx = -1;
var hints = [];

var commands = [
  {cmd:'about', desc:'about Aly Dhedhi'},
  {cmd:'activities', desc:'extracurricular activities'},
  {cmd:'clear', desc:'clear terminal'},
  {cmd:'contact', desc:'contact information'},
  {cmd:'cv', desc:'view CV'},
  {cmd:'education', desc:'education background'},
  {cmd:'help', desc:'show available commands'},
  {cmd:'impact', desc:'TCF fundraising impact'},
  {cmd:'projects', desc:'research projects'},
  {cmd:'research', desc:'current research'},
  {cmd:'socials', desc:'social media links'},
  {cmd:'welcome', desc:'show welcome screen'},
  {cmd:'whoami', desc:'about current user'}
];

function scrollBottom(){
  out.scrollTop = out.scrollHeight;
}

function printHTML(html){
  var d = document.createElement('div');
  d.className = 'cmd-output';
  d.innerHTML = html;
  out.appendChild(d);
  scrollBottom();
}

function printCmd(cmd){
  var d = document.createElement('div');
  d.className = 'cmd-output';
  d.innerHTML = '<span class="cmd-header">&gt; ' + cmd.split('<')[0].split('>')[0] + '</span>';
  out.appendChild(d);
  scrollBottom();
}

function printError(cmd){
  var d = document.createElement('div');
  d.className = 'cmd-output';
  d.innerHTML = '<span class="cmd-header">&gt; ' + cmd + '</span><div class="cmd-error">command not found: ' + cmd + '</div>';
  out.appendChild(d);
  scrollBottom();
}

function clearOutput(){
  out.innerHTML = '';
  scrollBottom();
}

function processCmd(cmd){
  cmd = cmd.trim();
  if(!cmd) return;
  history.unshift(cmd);
  historyIdx = -1;
  var parts = cmd.split(/\s+/);
  var c = parts[0].toLowerCase();
  switch(c){
    case 'welcome': printCmd(cmd); showWelcome(); break;
    case 'whoami': printCmd(cmd); showWhoami(); break;
    case 'about': printCmd(cmd); showAbout(); break;
    case 'research': printCmd(cmd); showResearch(); break;
    case 'projects': printCmd(cmd); showProjects(); break;
    case 'education': printCmd(cmd); showEducation(); break;
    case 'impact': printCmd(cmd); showImpact(); break;
    case 'activities': printCmd(cmd); showActivities(); break;
    case 'cv': printCmd(cmd); showCV(); break;
    case 'contact': printCmd(cmd); showContact(); break;
    case 'socials': printCmd(cmd); showSocials(); break;
    case 'help': printCmd(cmd); showHelp(); break;
    case 'clear': clearOutput(); break;
    default: printError(cmd); return;
  }
  input.value = '';
}

function getMatch(input){
  var m = [];
  commands.forEach(function(cmdObj){
    if(cmdObj.cmd.indexOf(input) === 0) m.push(cmdObj.cmd);
  });
  return m;
}

input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    processCmd(input.value);
  } else if(e.key === 'Tab' || (e.ctrlKey && e.key === 'i')){
    e.preventDefault();
    if(!input.value) return;
    var m = getMatch(input.value);
    if(m.length === 1){
      input.value = m[0];
    } else if(m.length > 1){
      hints = m;
      showHints(hints);
    }
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(historyIdx < history.length - 1){
      historyIdx++;
      input.value = history[historyIdx];
    }
  } else if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(historyIdx > 0){
      historyIdx--;
      input.value = history[historyIdx];
    } else if(historyIdx === 0){
      historyIdx = -1;
      input.value = '';
    }
  } else if(e.ctrlKey && e.key === 'l'){
    e.preventDefault();
    clearOutput();
  }
});

function showHints(hintsArr){
  var d = document.createElement('div');
  d.className = 'cmd-output';
  d.style.color = 'rgba(1,255,0,.3)';
  d.style.fontSize = '13px';
  d.innerHTML = hintsArr.join('  ');
  out.appendChild(d);
  scrollBottom();
}

        items.push({type:'bond', x1:phProj[i].sx,y1:phProj[i].sy, x2:phProj[j].sx,y2:phProj[j].sy, z:(phProj[i].sz+phProj[j].sz)/2, c1:ec(PH[i][3]),c2:ec(PH[j][3])});
      }
    }
  }
  PH.forEach(function(a,i){
    var p=phProj[i]; var r=vw(a[3])*scale*0.55+2;
    items.push({type:'sphere',x:p.sx,y:p.sy,z:p.z,r:r,col:ec(a[3])});
  });
  items.sort(function(a,b){return a.z-b.z;});
  items.forEach(function(it){
    if(it.type==='dot'){
      ctx.beginPath(); ctx.arc(it.x,it.y,it.r,0,6.283); ctx.fillStyle=it.col; ctx.fill();
    } else if(it.type==='bond'){
      var mx=(it.x1+it.x2)/2, my=(it.y1+it.y2)/2;
      ctx.beginPath(); ctx.moveTo(it.x1,it.y1); ctx.lineTo(mx,my); ctx.strokeStyle=it.c1; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(it.x2,it.y2); ctx.strokeStyle=it.c2; ctx.lineWidth=2.2; ctx.stroke();
    } else {
      var g=ctx.createRadialGradient(it.x-it.r*.3,it.y-it.r*.3,it.r*.08,it.x,it.y,it.r);
      g.addColorStop(0,'#fff'); g.addColorStop(0.25,it.col); g.addColorStop(1,'#111');
      ctx.beginPath(); ctx.arc(it.x,it.y,it.r,0,6.283); ctx.fillStyle=g; ctx.fill();
    }
  });
  var lh=28, lpad=14;
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,H-lh,W,lh);
  ctx.font='11px IBM Plex Mono,monospace'; ctx.fillStyle='#4A90D9';
  ctx.fillRect(lpad,H-lh+8,36,10); ctx.fillStyle='#555';
  ctx.fillText('Receptor backbone',lpad+42,H-lh+18);
  var px2=lpad+180;
  ctx.fillStyle='#FF6B35'; ctx.fillRect(px2,H-lh+8,12,10);
  ctx.fillStyle='rgba(255,107,53,0.4)'; ctx.fillRect(px2+14,H-lh+8,12,10);
  ctx.fillStyle='#555'; ctx.fillText('Peptide ribbon + VDW surface',px2+30,H-lh+18);
  ctx.fillStyle='#555'; ctx.textAlign='right'; ctx.fillText('drag . scroll',W-lpad,H-lh+18); ctx.textAlign='left';
}
var drag=false,lx=0,ly=0;
cv.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;cv.style.cursor='grabbing';});
window.addEventListener('mouseup',function(){drag=false;cv.style.cursor='grab';});
window.addEventListener('mousemove',function(e){
  if(!drag)return; rotY+=(e.clientX-lx)*0.007; rotX+=(e.clientY-ly)*0.007;
  lx=e.clientX;ly=e.clientY; draw();
});
cv.addEventListener('wheel',function(e){e.preventDefault(); zoom*=(e.deltaY>0?0.92:1.09); draw();},{passive:false});
var lt=null;
cv.addEventListener('touchstart',function(e){lt=e.touches[0];},{passive:true});
cv.addEventListener('touchmove',function(e){
  e.preventDefault(); var t=e.touches[0];
  rotY+=(t.clientX-lt.clientX)*0.009; rotX+=(t.clientY-lt.clientY)*0.009; lt=t; draw();
},{passive:false});
draw();
})();
  }, 100);
}

/* ── show welcome on load ── */
showWelcome();

/* ── focus input on load and on click ── */
input.focus();
document.addEventListener('click', function(){input.focus();});

})();
